apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: {{ include "mern-app.namespace" . }}
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: backend
          image: "{{ .Values.images.backend.repository }}:{{ .Values.images.backend.tag }}"
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: PORT
              value: "8080"
            - name: NODE_ENV
              value: "production"
            - name: CORS_ORIGIN
              value: {{ .Values.backend.corsOrigin | quote }}
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: mongodb-auth
                  key: uri
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: {{ include "mern-app.namespace" . }}
spec:
  selector:
    app: backend
  ports:
    - name: http
      port: 8080
      targetPort: http
